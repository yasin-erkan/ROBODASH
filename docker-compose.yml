services:
  db:
    image: mysql:8.0
    container_name: robodash-db
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: robodash
    volumes:
      - robodash_mysql_data:/var/lib/mysql

volumes:
  robodash_mysql_data:
